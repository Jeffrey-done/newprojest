<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg" />
  <link rel="apple-touch-icon" href="/assets/icons/favicon.svg" />
  <title>后台管理</title>
  <link rel="stylesheet" href="../assets/style.css" />
  <script src="../config.js"></script>
</head>
<body>
  <main class="container">
    <section class="card">
      <div class="space-between">
        <h1>文章管理后台</h1>
        <div class="row">
          <a class="btn ghost" href="../index.html">查看前台</a>
          <a class="btn primary" href="./edit.html">新增文章</a>
        </div>
      </div>
      <p class="muted">建议使用最小权限 Token；Token 只存储在当前浏览器会话中。</p>
      <div class="row">
        <input id="token" type="password" placeholder="粘贴 GitHub Token（仅当前会话有效）" aria-label="GitHub Token" />
        <button class="btn" id="saveTokenBtn">保存 Token</button>
        <button class="btn ghost" id="clearTokenBtn">清除 Token</button>
      </div>
    </section>

    <section class="card">
      <div class="space-between">
        <h2>文章列表</h2>
        <button class="btn" id="refreshBtn">刷新</button>
      </div>
      <div id="status" class="muted">加载中...</div>
      <div id="postList"></div>
    </section>
  </main>

  <script type="module">
    import { getPosts, removePost, saveToken, clearToken } from './utils.js';

    const listEl = document.getElementById('postList');
    const statusEl = document.getElementById('status');

    function renderEmptyState() {
      statusEl.textContent = '';
      listEl.innerHTML = `
        <article class="admin-state-card admin-state-empty">
          <div class="admin-state-icon">📝</div>
          <h3>还没有文章</h3>
          <p class="muted">现在就创建第一篇内容吧，写好后前台会自动展示。</p>
          <div class="row">
            <a class="btn primary" href="./edit.html">去写第一篇</a>
            <button class="btn ghost" id="tryRefreshEmpty">重新检查</button>
          </div>
        </article>
      `;
      document.getElementById('tryRefreshEmpty')?.addEventListener('click', load);
    }

    function renderErrorState(message) {
      statusEl.textContent = '';
      listEl.innerHTML = `
        <article class="admin-state-card admin-state-error">
          <div class="admin-state-icon">⚠️</div>
          <h3>文章列表暂时加载失败</h3>
          <p class="muted">${message}</p>
          <div class="row">
            <button class="btn" id="tryRefreshError">重试</button>
            <a class="btn ghost" href="./edit.html">直接新建文章</a>
          </div>
        </article>
      `;
      document.getElementById('tryRefreshError')?.addEventListener('click', load);
    }

    async function load() {
      statusEl.textContent = '加载中...';
      listEl.innerHTML = '';

      try {
        const posts = await getPosts();
        if (!posts.length) {
          renderEmptyState();
          return;
        }

        statusEl.textContent = `共 ${posts.length} 篇文章`;
        listEl.innerHTML = posts.map((p) => `
          <article class="card post-list-item">
            <div>
              <h3>${p.name}</h3>
              <div class="muted">${p.path} · ${(p.size / 1024).toFixed(1)} KB</div>
            </div>
            <div class="row">
              <a class="btn ghost" href="${p.htmlUrl}" target="_blank" rel="noreferrer">GitHub</a>
              <a class="btn primary" href="./edit.html?file=${encodeURIComponent(p.path)}">编辑</a>
              <button class="btn danger" data-delete="${p.path}" data-sha="${p.sha}">删除</button>
            </div>
          </article>
        `).join('');
      } catch (e) {
        const msg = e?.message || '未知错误';
        if (msg.includes('HTTP 404') || msg.includes('Not Found')) {
          renderEmptyState();
          return;
        }
        renderErrorState(msg.replace(/\n/g, '<br>'));
      }
    }

    document.getElementById('refreshBtn').addEventListener('click', load);
    document.getElementById('saveTokenBtn').addEventListener('click', () => {
      const token = document.getElementById('token').value;
      saveToken(token);
      alert('Token 已保存到会话存储。');
    });
    document.getElementById('clearTokenBtn').addEventListener('click', () => {
      clearToken();
      document.getElementById('token').value = '';
      alert('Token 已清除。');
    });

    listEl.addEventListener('click', async (e) => {
      const target = e.target;
      if (!(target instanceof HTMLElement) || !target.dataset.delete) return;

      const ok = window.confirm('确认删除？此操作不可恢复。');
      if (!ok) return;

      target.disabled = true;
      try {
        await removePost({ filePath: target.dataset.delete, sha: target.dataset.sha });
        await load();
      } catch (err) {
        alert(err.message);
      } finally {
        target.disabled = false;
      }
    });

    load();
  </script>
</body>
</html>
